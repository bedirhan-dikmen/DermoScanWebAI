<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">🏥 AI Deri Analizi</a>
            <a href="/" class="btn btn-outline-light">Ana Sayfaya Dön</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h4>Fotoğraf Yükle & Analiz Et</h4>
                    </div>
                    <div class="card-body text-center">
                        <form action="/test" method="post" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="file" class="form-label">Lütfen bir ben fotoğrafı seçin:</label>
                                <input class="form-control" type="file" name="file" required>
                            </div>
                            <button type="submit" class="btn btn-dark w-100">Analiz Et 🔍</button>
                        </form>
                    </div>
                </div>

                {% if prediction %}
                <div class="card mt-4 shadow border-{{ color }}">
                    <div class="card-header bg-{{ color }} text-white text-center">
                        <h5>SONUÇ: {{ prediction }}</h5>
                    </div>
                    <div class="card-body text-center">
                        <img src="{{ image_loc }}" class="img-thumbnail mb-3" style="max-height: 300px;">
                        <h4>Güven Oranı: %{{ probability }}</h4>
                        <p class="text-muted">Bu sonuç sadece bilgilendirme amaçlıdır. Kesin teşhis için doktora başvurunuz.</p>
                        <a href="/test" class="btn btn-outline-dark">Yeni Test Yap</a>
                    </div>
                </div>
                {% endif %}

            </div>
        </div>
    </div>

</body>
</html>
